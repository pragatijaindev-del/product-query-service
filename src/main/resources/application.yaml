spring:
  application:
    name: product-query-service

  datasource:
    url: jdbc:postgresql://localhost:5432/product_query_db
    username: postgres
    password: root
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true

server:
  port: 8080